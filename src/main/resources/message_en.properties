# --- Instruction View Layout ---
instructionView.title = THE RULE SHEETS
instructionView.back = BACK
instructionView.ruleOne.title = 1. SETUP
instructionView.ruleOne.body = Shuffle the deck. Hand everyone 4 cards and 1 Defuse card.
instructionView.ruleTwo.title = 2. PLAY YOUR CARDS
instructionView.ruleTwo.body = Play as many cards as you want from your hand to mess with opponents, skip, peek at the deck, or don't play anything at all!
instructionView.ruleThree.title = 3. THE CLIMAX (DRAW)
instructionView.ruleThree.body = To end your turn, you must draw a card from the deck. If you draw an Exploding Kitten and can't defuse it, your are dead. BOOM!
instructionView.ruleFour.title = 4. SURVIVE
instructionView.ruleFour.body = Outlast everyone else. If you are the last living player, you win.

