# --- instruction View Layout ---
instructionView.title = 游戏规则说明书
instructionView.back = 返回
instructionView.ruleOne.title = 1. 游戏准备
instructionView.ruleOne.body = 洗牌。给每位玩家分发 4 张普通手牌和 1 张【拆弹】卡。
instructionView.ruleTwo.title = 2. 出牌阶段
instructionView.ruleTwo.body = 在你的回合中，你可以从手牌中打出任意数量的卡牌来干扰对手、跳过回合、查看牌堆，或者干脆什么牌都不出！
instructionView.ruleThree.title = 3. 终极摸牌
instructionView.ruleThree.body = 为了结束你的回合，你必须从牌堆摸一张牌。如果你摸到了【爆炸猫】并且无法拆除它，你就会被炸飞！砰！
instructionView.ruleFour.title = 4. 努力活下去
instructionView.ruleFour.body = 坚持活得比所有人都久。如果你是最后一个存活的玩家，你就赢了！

